name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fix missing packages
        run: |
          sudo apt-get update
          sudo apt-get install -y libtinfo6 || true
          sudo ln -sf /lib/x86_64-linux-gnu/libtinfo.so.6 /lib/x86_64-linux-gnu/libtinfo.so.5 || true

      - name: Build APK
        uses: digreatbrian/buildozer-action@v2
        with:
          python-version: '3.11'
          buildozer-cmd: buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: timekeeper-debug-apk
          path: ./bin/*.apk
          retention-days: 30
